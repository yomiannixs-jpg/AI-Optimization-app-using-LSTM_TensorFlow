services:
  - type: web
    name: ngx-ai-optimization
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ngx_ai_app/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: TWELVEDATA_API_KEY
        value: ""
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
      - key: STREAMLIT_SERVER_PORT
        value: 10000
